# =============================================================================
# CI — Integration Tests
# =============================================================================
# Runs after lint+unit passes. Tests controller API interactions and
# device command execution using mocked transports. Can optionally
# connect to a real controller if SDN_CONTROLLER_HOST is set.

name: "CI: Integration Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      controller_host:
        description: "Controller host (leave empty for mocked tests)"
        required: false
        default: ""
      controller_type:
        description: "Controller type (odl or onos)"
        required: false
        default: "odl"

concurrency:
  group: ci-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  SDN_CONTROLLER_HOST: ${{ github.event.inputs.controller_host || '127.0.0.1' }}
  SDN_CONTROLLER_TYPE: ${{ github.event.inputs.controller_type || 'odl' }}

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: []  # Add dependency on lint-unit if using reusable workflows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests (mocked)
        run: |
          pytest tests/integration/ -m integration \
            --tb=short \
            -v \
            --junitxml=reports/integration-results.xml \
            --html=reports/integration-report.html \
            --self-contained-html \
            --timeout=60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/
          retention-days: 14

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke tests
        run: |
          pytest -m smoke \
            --tb=short \
            -v \
            --timeout=30
