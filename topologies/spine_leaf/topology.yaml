---
name: spine_leaf
description: >
  2-spine / 4-leaf Clos fabric for data center SDN testing.
  Each leaf connects to both spines. Hosts attach to leaf switches.

controller:
  type: odl
  host: "${SDN_CONTROLLER_HOST}"
  port: 8181

nodes:
  - name: spine-1
    role: spine
    mgmt_ip: "10.255.0.1"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: spine-2
    role: spine
    mgmt_ip: "10.255.0.2"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: leaf-1
    role: leaf
    mgmt_ip: "10.255.1.1"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: leaf-2
    role: leaf
    mgmt_ip: "10.255.1.2"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: leaf-3
    role: leaf
    mgmt_ip: "10.255.1.3"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: leaf-4
    role: leaf
    mgmt_ip: "10.255.1.4"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]

  - name: host-1
    role: host
    mgmt_ip: "10.0.10.1"
    device_type: linux
    interfaces: [eth0]
    metadata:
      vlan: 10
      gateway: "10.0.10.254"

  - name: host-2
    role: host
    mgmt_ip: "10.0.10.2"
    device_type: linux
    interfaces: [eth0]
    metadata:
      vlan: 10
      gateway: "10.0.10.254"

  - name: host-3
    role: host
    mgmt_ip: "10.0.20.1"
    device_type: linux
    interfaces: [eth0]
    metadata:
      vlan: 20
      gateway: "10.0.20.254"

  - name: host-4
    role: host
    mgmt_ip: "10.0.20.2"
    device_type: linux
    interfaces: [eth0]
    metadata:
      vlan: 20
      gateway: "10.0.20.254"

links:
  # Spine-1 to all leafs
  - src_node: spine-1
    src_interface: Ethernet1
    dst_node: leaf-1
    dst_interface: Ethernet1
    bandwidth: "40G"
  - src_node: spine-1
    src_interface: Ethernet2
    dst_node: leaf-2
    dst_interface: Ethernet1
    bandwidth: "40G"
  - src_node: spine-1
    src_interface: Ethernet3
    dst_node: leaf-3
    dst_interface: Ethernet1
    bandwidth: "40G"
  - src_node: spine-1
    src_interface: Ethernet4
    dst_node: leaf-4
    dst_interface: Ethernet1
    bandwidth: "40G"

  # Spine-2 to all leafs
  - src_node: spine-2
    src_interface: Ethernet1
    dst_node: leaf-1
    dst_interface: Ethernet2
    bandwidth: "40G"
  - src_node: spine-2
    src_interface: Ethernet2
    dst_node: leaf-2
    dst_interface: Ethernet2
    bandwidth: "40G"
  - src_node: spine-2
    src_interface: Ethernet3
    dst_node: leaf-3
    dst_interface: Ethernet2
    bandwidth: "40G"
  - src_node: spine-2
    src_interface: Ethernet4
    dst_node: leaf-4
    dst_interface: Ethernet2
    bandwidth: "40G"

  # Hosts to leafs
  - src_node: host-1
    src_interface: eth0
    dst_node: leaf-1
    dst_interface: Ethernet3
    bandwidth: "1G"
  - src_node: host-2
    src_interface: eth0
    dst_node: leaf-2
    dst_interface: Ethernet3
    bandwidth: "1G"
  - src_node: host-3
    src_interface: eth0
    dst_node: leaf-3
    dst_interface: Ethernet3
    bandwidth: "1G"
  - src_node: host-4
    src_interface: eth0
    dst_node: leaf-4
    dst_interface: Ethernet3
    bandwidth: "1G"

segments:
  - name: tenant-a
    vlan_id: 10
    vrf: "VRF-A"
    nodes: [host-1, host-2, leaf-1, leaf-2]
    description: "Tenant A — VLAN 10 across leaf-1 and leaf-2"

  - name: tenant-b
    vlan_id: 20
    vrf: "VRF-B"
    nodes: [host-3, host-4, leaf-3, leaf-4]
    description: "Tenant B — VLAN 20 across leaf-3 and leaf-4"

metadata:
  lab: virtual
  platform: containerlab
  asn_spine: 65000
  asn_leaf_base: 65001
