---
name: dc_fabric
description: >
  Production-like DC fabric: 4-spine / 8-leaf with border gateways.
  Used for large-scale failover and segmentation testing.

controller:
  type: odl
  host: "${SDN_CONTROLLER_HOST}"
  port: 8181

nodes:
  - name: spine-1
    role: spine
    mgmt_ip: "10.255.0.1"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]

  - name: spine-2
    role: spine
    mgmt_ip: "10.255.0.2"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]

  - name: spine-3
    role: spine
    mgmt_ip: "10.255.0.3"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]

  - name: spine-4
    role: spine
    mgmt_ip: "10.255.0.4"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]

  - name: leaf-1
    role: leaf
    mgmt_ip: "10.255.1.1"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6]

  - name: leaf-2
    role: leaf
    mgmt_ip: "10.255.1.2"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6]

  - name: leaf-3
    role: leaf
    mgmt_ip: "10.255.1.3"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6]

  - name: leaf-4
    role: leaf
    mgmt_ip: "10.255.1.4"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6]

  - name: border-1
    role: border
    mgmt_ip: "10.255.2.1"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]
    metadata:
      external_asn: 64512
      peering_ip: "198.51.100.1"

  - name: border-2
    role: border
    mgmt_ip: "10.255.2.2"
    device_type: arista_eos
    interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]
    metadata:
      external_asn: 64512
      peering_ip: "198.51.100.2"

  - name: fw-1
    role: firewall
    mgmt_ip: "10.255.3.1"
    device_type: paloalto_panos
    interfaces: [ethernet1/1, ethernet1/2]

links:
  # Spine-1 to leafs + borders
  - { src_node: spine-1, src_interface: Ethernet1, dst_node: leaf-1, dst_interface: Ethernet1, bandwidth: "100G" }
  - { src_node: spine-1, src_interface: Ethernet2, dst_node: leaf-2, dst_interface: Ethernet1, bandwidth: "100G" }
  - { src_node: spine-1, src_interface: Ethernet3, dst_node: leaf-3, dst_interface: Ethernet1, bandwidth: "100G" }
  - { src_node: spine-1, src_interface: Ethernet4, dst_node: leaf-4, dst_interface: Ethernet1, bandwidth: "100G" }
  - { src_node: spine-1, src_interface: Ethernet5, dst_node: border-1, dst_interface: Ethernet1, bandwidth: "100G" }
  - { src_node: spine-1, src_interface: Ethernet6, dst_node: border-2, dst_interface: Ethernet1, bandwidth: "100G" }

  # Spine-2 to leafs + borders
  - { src_node: spine-2, src_interface: Ethernet1, dst_node: leaf-1, dst_interface: Ethernet2, bandwidth: "100G" }
  - { src_node: spine-2, src_interface: Ethernet2, dst_node: leaf-2, dst_interface: Ethernet2, bandwidth: "100G" }
  - { src_node: spine-2, src_interface: Ethernet3, dst_node: leaf-3, dst_interface: Ethernet2, bandwidth: "100G" }
  - { src_node: spine-2, src_interface: Ethernet4, dst_node: leaf-4, dst_interface: Ethernet2, bandwidth: "100G" }
  - { src_node: spine-2, src_interface: Ethernet5, dst_node: border-1, dst_interface: Ethernet2, bandwidth: "100G" }
  - { src_node: spine-2, src_interface: Ethernet6, dst_node: border-2, dst_interface: Ethernet2, bandwidth: "100G" }

  # Firewall to borders
  - { src_node: fw-1, src_interface: "ethernet1/1", dst_node: border-1, dst_interface: Ethernet3, bandwidth: "10G" }
  - { src_node: fw-1, src_interface: "ethernet1/2", dst_node: border-2, dst_interface: Ethernet3, bandwidth: "10G" }

segments:
  - name: production
    vlan_id: 100
    vrf: "VRF-PROD"
    nodes: [leaf-1, leaf-2]
    description: "Production workloads"
  - name: staging
    vlan_id: 200
    vrf: "VRF-STAGE"
    nodes: [leaf-3, leaf-4]
    description: "Staging / pre-prod"
  - name: dmz
    vlan_id: 300
    vrf: "VRF-DMZ"
    nodes: [border-1, border-2, fw-1]
    description: "DMZ — internet-facing services"

metadata:
  lab: virtual
  platform: containerlab
  asn_spine: 65000
  asn_leaf_base: 65001
  asn_border: 65100
